<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Runner Console</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <p class="eyebrow">paypal-plus-runner</p>
        <h1>运行监控台</h1>
        <p class="subtitle">窗口、账号流程、CPA 上传和回调 JSON 的统一观察面板</p>
      </div>
      <div class="toolbar" aria-label="控制区">
        <div class="sync-state">
          <span class="sync-dot" id="sync-dot"></span>
          <span id="last-updated">等待刷新</span>
        </div>
        <button id="refresh" type="button">刷新</button>
      </div>
    </header>

    <section class="overview" id="summary" aria-label="运行概览"></section>

    <main class="workspace">
      <section class="panel primary-panel" aria-labelledby="runs-title">
        <div class="panel-header">
          <div>
            <p class="section-kicker">Accounts</p>
            <h2 id="runs-title">窗口与账号流程</h2>
          </div>
          <div class="filters" id="filters" aria-label="运行状态筛选">
            <button class="filter active" type="button" data-filter="all">全部</button>
            <button class="filter" type="button" data-filter="running">运行中</button>
            <button class="filter" type="button" data-filter="failed">失败</button>
            <button class="filter" type="button" data-filter="done">完成</button>
          </div>
        </div>
        <div class="run-list" id="runs"></div>
      </section>

      <aside class="sidebar" aria-label="侧边详情">
        <section class="panel detail-panel" aria-labelledby="detail-title">
          <div class="panel-header compact">
            <div>
              <p class="section-kicker">Selected</p>
              <h2 id="detail-title">账号详情</h2>
            </div>
            <span class="status neutral" id="detail-status">未选择</span>
          </div>
          <div id="run-detail" class="detail-empty">选择左侧账号后查看完整 runId、路径、错误和回调信息。</div>
        </section>

        <section class="panel resource-panel" aria-labelledby="resource-title">
          <div class="panel-header compact">
            <div>
              <p class="section-kicker">Inventory</p>
              <h2 id="resource-title">资源池</h2>
            </div>
          </div>
          <div class="resource-list" id="resources"></div>
        </section>

        <section class="panel events-panel" aria-labelledby="events-title">
          <div class="panel-header compact">
            <div>
              <p class="section-kicker">Live</p>
              <h2 id="events-title">实时事件</h2>
            </div>
            <span class="event-count" id="event-count">0</span>
          </div>
          <div id="events" class="events">
            <div class="empty-state">暂无实时事件，新的运行日志会自动出现在这里。</div>
          </div>
        </section>
      </aside>
    </main>

    <section class="footer-note">
      本页面只展示脱敏后的运行信息，不展示 bearer、token、验证码、完整 OAuth code/state。
    </section>
  </div>
  <script src="/app.js"></script>
</body>
</html>
